name: .NET CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop, code-quality-improvements ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore Redis.Stream.Subscriber.sln

    - name: Build
      run: dotnet build Redis.Stream.Subscriber.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test Redis.Stream.Subscriber.sln --configuration Release --no-build --verbosity normal
