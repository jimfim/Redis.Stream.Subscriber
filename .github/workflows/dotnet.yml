name: .NET CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop, code-quality-improvements ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore Redis.Stream.Subscriber.sln

    - name: Build
      run: dotnet build Redis.Stream.Subscriber.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=true /p:WarningLevel=3

    - name: Test
      run: dotnet test Redis.Stream.Subscriber.sln --configuration Release --no-build --verbosity normal

    - name: Restore packages with vulnerability check
      run: dotnet restore Redis.Stream.Subscriber.sln

    - name: Check for vulnerabilities using NuGet audit
      run: |
        OUTPUT=$(dotnet list package --vulnerable 2>&1)
        echo "$OUTPUT"
        if echo "$OUTPUT" | grep -q "has a known"; then
          echo "Vulnerabilities found!"
          exit 1
        fi

    - name: Calculate version with GitVersion
      uses: gittools/actions/gitversion/setup@v0
      with:
        versionSpec: '5.x'

    - name: Run GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v0
      with:
        useInstalledVersion: true

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.gitversion.outputs.semver }}
        name: Release ${{ steps.gitversion.outputs.semver }}
        body: ${{ steps.gitversion.outputs.commitMessage }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
